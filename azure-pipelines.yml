# ─────────────────────────────────────────────────────────
# ShopCart — Azure DevOps CI/CD Pipeline
# CI: Build & Push to ACR
# CD: Deploy to AKS via Helm
# ─────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/**

pr:
  branches:
    include:
      - main
      - develop

# ── Pipeline Variables ────────────────────────────────────
variables:
  ACR_LOGIN_SERVER:       "shopcartacr.azurecr.io"
  AKS_CLUSTER:            "shopcart-aks"
  RESOURCE_GROUP:         "shopcart-rg"
  HELM_CHART_PATH:        "helm/shopcart"
  HELM_RELEASE_NAME:      "shopcart"
  IMAGE_TAG:              "$(Build.BuildId)"

# ═══════════════════════════════════════════
# STAGE 1: CI — Build & Push to ACR
# ═══════════════════════════════════════════
stages:
- stage: CI
  displayName: "🔨 Build & Push to ACR"
  jobs:

  - job: Build
    displayName: "Build & Push Docker Images"
    pool:
      vmImage: "ubuntu-latest"
    steps:

      # Login to ACR
      - task: Docker@2
        displayName: "Login to ACR"
        inputs:
          command: login
          containerRegistry: "shopcart-acr-connection"

      # Build & Push User Service
      - task: Docker@2
        displayName: "Build & Push user-service"
        inputs:
          command: buildAndPush
          repository: "user-service"
          containerRegistry: "shopcart-acr-connection"
          dockerfile: "user-service/Dockerfile"
          buildContext: "user-service/"
          tags: |
            $(IMAGE_TAG)
            latest

      # Build & Push Product Service
      - task: Docker@2
        displayName: "Build & Push product-service"
        inputs:
          command: buildAndPush
          repository: "product-service"
          containerRegistry: "shopcart-acr-connection"
          dockerfile: "product-service/Dockerfile"
          buildContext: "product-service/"
          tags: |
            $(IMAGE_TAG)
            latest

      # Build & Push Frontend Service
      - task: Docker@2
        displayName: "Build & Push frontend-service"
        inputs:
          command: buildAndPush
          repository: "frontend-service"
          containerRegistry: "shopcart-acr-connection"
          dockerfile: "frontend-service/Dockerfile"
          buildContext: "frontend-service/"
          tags: |
            $(IMAGE_TAG)
            latest

      # Publish Helm chart as pipeline artifact
      - task: PublishPipelineArtifact@1
        displayName: "Publish Helm Chart"
        inputs:
          targetPath: "$(HELM_CHART_PATH)"
          artifact: "helm-chart"

# ═══════════════════════════════════════════
# STAGE 2: CD — Deploy to Staging
# Runs on develop branch only
# ═══════════════════════════════════════════
- stage: Deploy_Staging
  displayName: "🚧 Deploy to Staging via Helm"
  dependsOn: CI
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    )
  variables:
    K8S_NAMESPACE:      "shopcart-staging"
    HELM_VALUES_FILE:   "values-staging.yaml"
  jobs:

  - deployment: HelmDeploy_Staging
    displayName: "Helm Deploy to Staging"
    pool:
      vmImage: "ubuntu-latest"
    environment: "staging"
    strategy:
      runOnce:
        deploy:
          steps:

            # Download Helm chart artifact from CI stage
            - task: DownloadPipelineArtifact@2
              displayName: "Download Helm Chart"
              inputs:
                artifactName: "helm-chart"
                targetPath: "$(Pipeline.Workspace)/helm-chart"

            # Install Helm on the agent
            - task: HelmInstaller@1
              displayName: "Install Helm"
              inputs:
                helmVersionToInstall: "3.14.0"

            # Connect kubectl to AKS
            - task: AzureCLI@2
              displayName: "Get AKS Credentials"
              inputs:
                azureSubscription: "shopcart-azure-connection"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  az aks get-credentials \
                    --name $(AKS_CLUSTER) \
                    --resource-group $(RESOURCE_GROUP) \
                    --overwrite-existing

            # Create namespace if it doesn't exist
            - task: AzureCLI@2
              displayName: "Create Namespace"
              inputs:
                azureSubscription: "shopcart-azure-connection"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  kubectl create namespace $(K8S_NAMESPACE) \
                    --dry-run=client -o yaml | kubectl apply -f -

            # Helm lint before deploy (catches errors early)
            - task: Bash@3
              displayName: "Helm Lint"
              inputs:
                targetType: "inline"
                script: |
                  helm lint $(Pipeline.Workspace)/helm-chart/ \
                    --values $(Pipeline.Workspace)/helm-chart/values.yaml \
                    --values $(Pipeline.Workspace)/helm-chart/$(HELM_VALUES_FILE)

            # Helm upgrade --install
            # upgrade = update if exists
            # install = fresh install if not exists
            # This is idempotent — safe to run multiple times
            - task: Bash@3
              displayName: "Helm Deploy to Staging"
              inputs:
                targetType: "inline"
                script: |
                  helm upgrade --install $(HELM_RELEASE_NAME) \
                    $(Pipeline.Workspace)/helm-chart/ \
                    --namespace $(K8S_NAMESPACE) \
                    --values $(Pipeline.Workspace)/helm-chart/values.yaml \
                    --values $(Pipeline.Workspace)/helm-chart/$(HELM_VALUES_FILE) \
                    --set global.imageTag=$(IMAGE_TAG) \
                    --set global.registry=$(ACR_LOGIN_SERVER) \
                    --atomic \
                    --timeout 5m \
                    --cleanup-on-fail \
                    --history-max 5 \
                    --wait

            # Verify all pods are running
            - task: Bash@3
              displayName: "Verify Staging Deployment"
              inputs:
                targetType: "inline"
                script: |
                  echo "── Pods ──────────────────────────────"
                  kubectl get pods -n $(K8S_NAMESPACE)

                  echo "── Services ──────────────────────────"
                  kubectl get services -n $(K8S_NAMESPACE)

                  echo "── Ingress ───────────────────────────"
                  kubectl get ingress -n $(K8S_NAMESPACE)

                  echo "── Helm Release ──────────────────────"
                  helm status $(HELM_RELEASE_NAME) -n $(K8S_NAMESPACE)

# ═══════════════════════════════════════════
# STAGE 3: CD — Deploy to Production
# Runs on main branch + requires approval
# ═══════════════════════════════════════════
- stage: Deploy_Production
  displayName: "🚀 Deploy to Production via Helm"
  dependsOn: CI
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main')
    )
  variables:
    K8S_NAMESPACE:      "shopcart"
    HELM_VALUES_FILE:   "values-production.yaml"
  jobs:

  - deployment: HelmDeploy_Production
    displayName: "Helm Deploy to Production"
    pool:
      vmImage: "ubuntu-latest"
    # 'production' environment has manual approval gate configured
    # in Azure DevOps → Environments → production → Approvals
    environment: "production"
    strategy:
      runOnce:
        deploy:
          steps:

            - task: DownloadPipelineArtifact@2
              displayName: "Download Helm Chart"
              inputs:
                artifactName: "helm-chart"
                targetPath: "$(Pipeline.Workspace)/helm-chart"

            - task: HelmInstaller@1
              displayName: "Install Helm"
              inputs:
                helmVersionToInstall: "3.14.0"

            - task: AzureCLI@2
              displayName: "Get AKS Credentials"
              inputs:
                azureSubscription: "shopcart-azure-connection"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  az aks get-credentials \
                    --name $(AKS_CLUSTER) \
                    --resource-group $(RESOURCE_GROUP) \
                    --overwrite-existing

            - task: AzureCLI@2
              displayName: "Create Namespace"
              inputs:
                azureSubscription: "shopcart-azure-connection"
                scriptType: "bash"
                scriptLocation: "inlineScript"
                inlineScript: |
                  kubectl create namespace $(K8S_NAMESPACE) \
                    --dry-run=client -o yaml | kubectl apply -f -

            - task: Bash@3
              displayName: "Helm Lint"
              inputs:
                targetType: "inline"
                script: |
                  helm lint $(Pipeline.Workspace)/helm-chart/ \
                    --values $(Pipeline.Workspace)/helm-chart/values.yaml \
                    --values $(Pipeline.Workspace)/helm-chart/$(HELM_VALUES_FILE)

            # Show what WILL change before applying (like a dry run)
            - task: Bash@3
              displayName: "Helm Diff (What Will Change)"
              inputs:
                targetType: "inline"
                script: |
                  helm upgrade --install $(HELM_RELEASE_NAME) \
                    $(Pipeline.Workspace)/helm-chart/ \
                    --namespace $(K8S_NAMESPACE) \
                    --values $(Pipeline.Workspace)/helm-chart/values.yaml \
                    --values $(Pipeline.Workspace)/helm-chart/$(HELM_VALUES_FILE) \
                    --set global.imageTag=$(IMAGE_TAG) \
                    --set global.registry=$(ACR_LOGIN_SERVER) \
                    --dry-run \
                    --debug 2>&1 | head -100

            # Actual Production Deploy
            - task: Bash@3
              displayName: "Helm Deploy to Production"
              inputs:
                targetType: "inline"
                script: |
                  helm upgrade --install $(HELM_RELEASE_NAME) \
                    $(Pipeline.Workspace)/helm-chart/ \
                    --namespace $(K8S_NAMESPACE) \
                    --values $(Pipeline.Workspace)/helm-chart/values.yaml \
                    --values $(Pipeline.Workspace)/helm-chart/$(HELM_VALUES_FILE) \
                    --set global.imageTag=$(IMAGE_TAG) \
                    --set global.registry=$(ACR_LOGIN_SERVER) \
                    --atomic \
                    --timeout 5m \
                    --cleanup-on-fail \
                    --history-max 10 \
                    --wait

            # Verify production pods
            - task: Bash@3
              displayName: "Verify Production Deployment"
              inputs:
                targetType: "inline"
                script: |
                  echo "── Pods ──────────────────────────────"
                  kubectl get pods -n $(K8S_NAMESPACE)

                  echo "── Services ──────────────────────────"
                  kubectl get services -n $(K8S_NAMESPACE)

                  echo "── Ingress ───────────────────────────"
                  kubectl get ingress -n $(K8S_NAMESPACE)

                  echo "── Helm History ──────────────────────"
                  helm history $(HELM_RELEASE_NAME) -n $(K8S_NAMESPACE)

            # Tag git commit with release version for traceability
            - task: Bash@3
              displayName: "Tag Git Release"
              inputs:
                targetType: "inline"
                script: |
                  git config user.email "devops@yourcompany.com"
                  git config user.name "Azure DevOps"
                  git tag "release-$(IMAGE_TAG)"
                  git push origin "release-$(IMAGE_TAG)"