{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopcart-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{ include "shopcart.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    appgw.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.sslRedirect | quote }}
    appgw.ingress.kubernetes.io/connection-draining: {{ .Values.ingress.connectionDraining | quote }}
    appgw.ingress.kubernetes.io/connection-draining-timeout: {{ .Values.ingress.connectionDrainingTimeout | quote }}
    appgw.ingress.kubernetes.io/cookie-based-affinity: {{ .Values.ingress.cookieAffinity | quote }}
    appgw.ingress.kubernetes.io/request-timeout: {{ .Values.ingress.requestTimeout | quote }}
    appgw.ingress.kubernetes.io/waf-policy-for-path: {{ .Values.ingress.wafPolicyId | quote }}
spec:
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontendService.name }}
                port:
                  number: 80
{{- end }}