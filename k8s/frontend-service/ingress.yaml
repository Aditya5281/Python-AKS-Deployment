apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopcart-ingress
  namespace: shopcart
  annotations:
    # Tells K8s to use Azure App Gateway Ingress Controller
    kubernetes.io/ingress.class: azure/application-gateway

    # SSL redirect: HTTP → HTTPS
    appgw.ingress.kubernetes.io/ssl-redirect: "true"

    # Connection draining (graceful shutdown)
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"

    # Cookie-based session affinity
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"

    # Request timeout
    appgw.ingress.kubernetes.io/request-timeout: "60"

    # Backend health probe path
    appgw.ingress.kubernetes.io/health-probe-path: "/"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"
spec:
  # TLS termination at App Gateway
  tls:
    - hosts:
        - shopcart.yourdomain.com
      secretName: shopcart-tls-secret   # Kubernetes secret holding TLS cert
  rules:
    - host: shopcart.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80